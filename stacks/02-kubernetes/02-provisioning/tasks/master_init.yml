---
- name: Initialize the first Master node (k8s-master-01)
  ansible.builtin.command: >-
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --apiserver-advertise-address={{ ansible_host }}
    --node-name {{ inventory_hostname }}
  register: kubeadminit
  when: inventory_hostname == "k8s-master-01"
  args:
    creates: /etc/kubernetes/admin.conf

- name: Configure kubectl for the primary master
  when: inventory_hostname == "k8s-master-01"
  block:
    - name: Create the .kube directory
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0755'

    - name: Copy admin.conf to root kube config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'
        owner: root
        group: root

    - name: Set KUBECONFIG environment variable in .bashrc
      ansible.builtin.lineinfile:
        path: /root/.bashrc
        line: 'export KUBECONFIG=/root/.kube/config'
        state: present

- name: Generate the join command on the primary master
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command_raw
  when: inventory_hostname == "k8s-master-01"
  changed_when: false

- name: Set join command as a global fact
  ansible.builtin.set_fact:
    join_command: "{{ join_command_raw.stdout }}"
  when: inventory_hostname == "k8s-master-01"

- name: Restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted